stages:
  - security-scan

sast_scan:
  stage: security-scan
  image: returntocorp/semgrep:latest
  before_script:
    - chmod +x ./security/scripts/run-sast.ps1 || true
  script:
    - pwsh -File ./security/scripts/run-sast.ps1
  artifacts:
    name: "sast-report"
    when: always
    paths:
      - security/reports/sast/

sca_scan:
  stage: security-scan
  image: mcr.microsoft.com/dotnet/sdk:9.0
  before_script:
    - chmod +x ./security/scripts/run-sca.ps1 || true
  script:
    - pwsh -File ./security/scripts/run-sca.ps1
  artifacts:
    name: "sca-report"
    when: always
    paths:
      - security/reports/sca/

dast_scan:
  stage: security-scan
  image: zaproxy/zap-stable
  before_script:
    - chmod +x ./security/scripts/run-dast.ps1 || true
  script:
    - pwsh -File ./security/scripts/run-dast.ps1
  artifacts:
    name: "dast-report"
    when: always
    paths:
      - security/reports/dast/
