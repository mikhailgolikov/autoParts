stages:
  - security-scan

sast_scan:
  stage: security-scan
  image: returntocorp/semgrep:latest
  script:
    - semgrep --config security/sast/.semgrep.yml --config p/secrets --config p/csharp src/ security/samples/ --sarif --output semgrep.sarif
  artifacts:
    name: "sast-report"
    when: always
    paths:
      - security/reports/sast/
      - semgrep.sarif
  allow_failure: true

sca_scan:
  stage: security-scan
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore
    - dotnet list package --vulnerable --include-transitive 2>&1 | tee sca-report.txt
  artifacts:
    name: "sca-report"
    when: always
    paths:
      - security/reports/sca/
      - sca-report.txt
  allow_failure: true

dast_scan:
  stage: security-scan
  image: zaproxy/zap-stable
  script:
    - zap-api-scan.py -t http://localhost:5065/swagger/v1/swagger.json -f openapi -r zap-report.html || true
  artifacts:
    name: "dast-report"
    when: always
    paths:
      - security/reports/dast/
      - zap-report.html
  allow_failure: true