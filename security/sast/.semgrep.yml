# Semgrep SAST configuration for AutoPartsStore (.NET / C#)

rules:
  - id: autoparts-hardcoded-jwt-key
    languages: [json]
    severity: ERROR
    message: >
      Hardcoded JWT secret in configuration. Use environment variables or
      ASP.NET User Secrets instead of committing secrets to appsettings.
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A02:2021 - Cryptographic Failures"
    patterns:
      - pattern-regex: (?i)"Key"\s*:\s*"(?!CHANGE_ME)[^"]{8,}"

  - id: autoparts-hardcoded-db-password
    languages: [json]
    severity: ERROR
    message: >
      Database password in connection string. Move to environment variable
      ConnectionStrings__DefaultConnection or User Secrets.
    metadata:
      category: security
      cwe: "CWE-798"
    patterns:
      - pattern-regex: (?i)Password\s*=\s*[^;\s"']+

  - id: autoparts-sql-string-concatenation
    languages: [csharp]
    severity: ERROR
    message: >
      Possible SQL injection: string concatenation in SQL query.
      Use EF Core parameterized queries or FromSqlInterpolated.
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 - Injection"
    pattern-either:
      - pattern: $DB.Database.ExecuteSqlRaw($QUERY + ...)
      - pattern: '"SELECT * FROM Users WHERE Email = ''" + $EMAIL + "''"'

  - id: autoparts-hardcoded-password-constant
    languages: [csharp]
    severity: ERROR
    message: >
      Hardcoded password in source code (CWE-798). Never store credentials in code.
    metadata:
      category: security
      cwe: "CWE-798"
    patterns:
      - pattern: private const string $NAME = "$VALUE";
      - metavariable-regex:
          metavariable: $NAME
          regex: (?i).*(password|secret|apikey).*

  - id: autoparts-weak-password-validation
    languages: [csharp]
    severity: WARNING
    message: >
      Password minimum length below 8 characters weakens account security.
    metadata:
      category: security
      cwe: "CWE-521"
    pattern: MinimumLength(6)
